<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUSTERENKO // @XIPEJ</title>
    <style>
        :root {
            --bg: #050508;
            --accent: #a855f7;
            --accent-glow: rgba(168, 85, 247, 0.4);
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #fff;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        /* Тот самый снег */
        #snow {
            position: fixed; top: 0; left: 0; z-index: 1; pointer-events: none;
        }

        /* Статичное свечение под картой */
        .glow {
            position: absolute; width: 300px; height: 300px;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            filter: blur(60px); z-index: 0;
        }

        .container {
            position: relative; z-index: 10;
            width: 90%; max-width: 380px;
        }

        /* ХЕДЕР С РАСТЯНУТЫМ ТЕКСТОМ */
        .brand-header {
            text-align: center; margin-bottom: 25px;
        }

        .brand-header h1 {
            font-size: 22px;
            font-weight: 900;
            letter-spacing: 12px; /* Ебейший растяг текста */
            text-transform: uppercase;
            margin: 0;
            background: linear-gradient(180deg, #fff 0%, #888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .founder-badge {
            margin-top: 10px;
            font-size: 9px;
            letter-spacing: 4px; /* Растяг статуса */
            text-transform: uppercase;
            color: var(--accent);
            font-weight: 700;
            opacity: 0.8;
        }

        .founder-name {
            font-size: 16px;
            letter-spacing: 2px;
            margin-top: 4px;
            font-weight: 300;
            color: #fff;
        }

        /* КАРТОЧКА - ЖИДКОЕ СТЕКЛО */
        .card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            margin-bottom: 15px;
        }

        h2 {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: rgba(255,255,255,0.4);
            margin-bottom: 20px;
            text-align: center;
        }

        input {
            width: 100%; padding: 16px 20px; margin-bottom: 12px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            border-radius: 15px; color: #fff;
            font-size: 14px; box-sizing: border-box; outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--accent);
            background: rgba(168, 85, 247, 0.05);
        }

        button {
            width: 100%; padding: 16px;
            background: #fff; color: #000;
            border: none; font-weight: 800; border-radius: 15px;
            cursor: pointer; transition: 0.3s;
            text-transform: uppercase; font-size: 11px; letter-spacing: 2px;
        }

        button:hover {
            background: var(--accent); color: #fff;
            box-shadow: 0 0 25px var(--accent-glow);
        }

        /* АРХИВ */
        #vault-section {
            display: none; margin-top: 15px;
            max-height: 200px; overflow-y: auto;
        }

        .entry {
            background: rgba(255, 255, 255, 0.03);
            padding: 15px; border-radius: 12px;
            margin-bottom: 10px; border-left: 2px solid var(--accent);
            font-size: 12px; font-family: monospace;
        }

        .entry b { color: var(--accent); margin-right: 5px; }

        .btn-clear {
            background: transparent; border: 1px solid rgba(255, 68, 68, 0.3);
            color: #ff4444; font-size: 9px; margin-top: 10px;
        }

        /* FOOTER */
        .footer {
            text-align: center; font-size: 8px; color: rgba(255,255,255,0.2);
            letter-spacing: 2px; text-transform: uppercase; margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="glow"></div>
    <canvas id="snow"></canvas>

    <div class="container">
        <div class="brand-header">
            <h1>BUSTERENKO</h1>
            <div class="founder-badge">Founding Director</div>
            <div class="founder-name">@xipej</div>
        </div>

        <div class="card">
            <h2>Add Record</h2>
            <input type="text" id="phone" placeholder="Identity">
            <input type="text" id="code" placeholder="Service Code">
            <input type="password" id="pass" placeholder="Security Key">
            <button onclick="saveData()">Authorize & Sync</button>
        </div>

        <div class="card">
            <h2>Access Vault</h2>
            <input type="password" id="master-pin" placeholder="Master PIN">
            <button onclick="unlock()">Authenticate</button>

            <div id="vault-section">
                <div id="data-list"></div>
                <button class="btn-clear" onclick="clearAll()">Purge Database</button>
            </div>
        </div>

        <div class="footer">
            Busterenko Secure Systems // v2.0
        </div>
    </div>

    <script>
        const canvas = document.getElementById('snow');
        const ctx = canvas.getContext('2d');
        let width, height, flakes = [];

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            flakes = Array(80).fill().map(() => ({
                x: Math.random() * width, y: Math.random() * height,
                r: Math.random() * 1.5 + 0.5, s: Math.random() * 0.4 + 0.1
            }));
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = "rgba(255, 255, 255, 0.2)";
            ctx.beginPath();
            flakes.forEach(f => {
                ctx.moveTo(f.x, f.y); ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
                f.y += f.s; if (f.y > height) f.y = -5;
            });
            ctx.fill();
            requestAnimationFrame(animate);
        }
        window.onresize = init; init(); animate();

        function saveData() {
            const p = document.getElementById('phone').value;
            const c = document.getElementById('code').value;
            const ps = document.getElementById('pass').value;
            if(!p || !c || !ps) return;
            let db = JSON.parse(localStorage.getItem('b_final_mob') || "[]");
            db.push({p, c, ps});
            localStorage.setItem('b_final_mob', JSON.stringify(db));
            alert("SECURED BY FOUNDER");
            document.querySelectorAll('input:not(#master-pin)').forEach(i => i.value = '');
        }

        function unlock() {
            const pin = document.getElementById('master-pin').value;
            if(pin === "5858") {
                const section = document.getElementById('vault-section');
                section.style.display = "block";
                const data = JSON.parse(localStorage.getItem('b_final_mob') || "[]");
                document.getElementById('data-list').innerHTML = data.map(i => `
                    <div class="entry"><b>ID:</b> ${i.p}<br><b>SRV:</b> ${i.c}<br><b>PSS:</b> ${i.ps}</div>
                `).join('') || "<p style='text-align:center; opacity:0.3; font-size:10px;'>Empty</p>";
            } else { alert("ACCESS DENIED"); }
        }

        function clearAll() {
            if(confirm("Purge?")) { localStorage.removeItem('b_final_mob'); unlock(); }
        }
    </script>
</body>
</html>
