<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUSTERENKO // FOUNDER @XIPEJ</title>
    <style>
        :root {
            --bg: #040406;
            --accent: #bc13fe; 
            --accent-glow: rgba(188, 19, 254, 0.4);
            --glass: rgba(255, 255, 255, 0.02);
            --border: rgba(255, 255, 255, 0.07);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: var(--bg);
            font-family: 'Inter', sans-serif;
            color: #fff;
            overflow: hidden;
            display: flex; flex-direction: column;
        }

        #snow {
            position: fixed; top: 0; left: 0; z-index: 1; pointer-events: none;
        }

        /* Статичное свечение центра управления */
        .founder-glow {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw; height: 100vh;
            background: radial-gradient(circle at center, rgba(188, 19, 254, 0.07) 0%, transparent 70%);
            z-index: 0;
        }

        /* ХЕДЕР С ТВОИМ СТАТУСОМ */
        header {
            position: relative; z-index: 10;
            padding: 40px 60px;
            display: flex; justify-content: space-between; align-items: flex-end;
        }

        .brand-block h1 {
            font-size: 32px; font-weight: 900; letter-spacing: 15px;
            margin: 0; text-transform: uppercase;
            background: linear-gradient(to bottom, #fff, #666);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .founder-block {
            text-align: right;
        }

        .founder-label {
            font-size: 10px; letter-spacing: 3px; color: var(--accent);
            text-transform: uppercase; font-weight: 800; margin-bottom: 5px;
        }

        .founder-name {
            font-size: 24px; font-weight: 300; letter-spacing: 2px;
            color: #fff; text-shadow: 0 0 20px var(--accent-glow);
        }

        /* ОСНОВНОЙ ТЕРМИНАЛ (РАСТЯГ) */
        .main-grid {
            position: relative; z-index: 10;
            flex: 1; display: grid;
            grid-template-columns: 1fr 1.5fr; /* Лево - ввод, Право - архив */
            gap: 40px; padding: 0 60px 60px 60px;
        }

        .panel {
            background: var(--glass);
            backdrop-filter: blur(40px);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 50px;
            display: flex; flex-direction: column;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        h2 {
            font-size: 14px; text-transform: uppercase; letter-spacing: 5px;
            margin-bottom: 40px; color: rgba(255,255,255,0.4);
            display: flex; align-items: center;
        }

        h2::before {
            content: ""; width: 20px; height: 1px; background: var(--accent); margin-right: 15px;
        }

        .input-wrap { margin-bottom: 25px; }

        input {
            width: 100%; padding: 22px 30px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 20px; color: #fff;
            font-size: 18px; outline: none; transition: 0.4s;
            box-sizing: border-box;
        }

        input:focus {
            border-color: var(--accent);
            background: rgba(188, 19, 254, 0.05);
            box-shadow: 0 0 30px rgba(188, 19, 254, 0.1);
        }

        button {
            padding: 22px; border-radius: 20px; border: none;
            background: #fff; color: #000; font-weight: 900;
            text-transform: uppercase; letter-spacing: 2px; font-size: 14px;
            cursor: pointer; transition: 0.3s; margin-top: auto;
        }

        button:hover {
            background: var(--accent); color: #fff;
            box-shadow: 0 0 40px var(--accent-glow);
            transform: translateY(-3px);
        }

        /* АРХИВ ОСНОВАТЕЛЯ */
        #vault-section {
            display: none; height: 100%; flex-direction: column;
        }

        .scroll-area {
            flex: 1; overflow-y: auto; padding-right: 20px;
        }

        .entry {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            padding: 25px; border-radius: 24px;
            margin-bottom: 20px; font-family: 'Consolas', monospace;
            display: grid; grid-template-columns: 1fr 1fr 1fr;
            align-items: center; transition: 0.3s;
        }

        .entry:hover { background: rgba(188, 19, 254, 0.05); border-color: var(--accent); }

        .entry b { color: var(--accent); font-size: 11px; display: block; margin-bottom: 5px; opacity: 0.6; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="founder-glow"></div>
    <canvas id="snow"></canvas>

    <header>
        <div class="brand-block">
            <h1>BUSTERENKO</h1>
        </div>
        <div class="founder-block">
            <div class="founder-label">Founding Director</div>
            <div class="founder-name">@xipej</div>
        </div>
    </header>

    <main class="main-grid">
        <div class="panel">
            <h2>System Registry</h2>
            <div class="input-wrap"><input type="text" id="phone" placeholder="IDENTITY"></div>
            <div class="input-wrap"><input type="text" id="code" placeholder="SERVICE CODE"></div>
            <div class="input-wrap"><input type="password" id="pass" placeholder="SECURITY KEY"></div>
            <button onclick="saveData()">Authorize & Save</button>
        </div>

        <div class="panel">
            <h2>Secure Archive</h2>
            <div id="auth-box">
                <input type="password" id="master-pin" placeholder="MASTER PIN">
                <button style="margin-top:20px; width:100%;" onclick="unlock()">Unlock Records</button>
            </div>

            <div id="vault-section">
                <div class="scroll-area" id="data-list"></div>
                <button style="background:transparent; color:#ff4444; border:1px solid rgba(255,68,68,0.3); margin-top:20px;" onclick="clearAll()">Purge Core</button>
            </div>
        </div>
    </main>

    <script>
        const canvas = document.getElementById('snow');
        const ctx = canvas.getContext('2d');
        let width, height, flakes = [];

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            flakes = Array(150).fill().map(() => ({
                x: Math.random() * width, y: Math.random() * height,
                r: Math.random() * 2 + 0.5, s: Math.random() * 0.5 + 0.2
            }));
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = "rgba(255, 255, 255, 0.2)";
            ctx.beginPath();
            flakes.forEach(f => {
                ctx.moveTo(f.x, f.y); ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
                f.y += f.s; if (f.y > height) f.y = -5;
            });
            ctx.fill();
            requestAnimationFrame(animate);
        }
        window.onresize = init; init(); animate();

        function saveData() {
            const p = document.getElementById('phone').value;
            const c = document.getElementById('code').value;
            const ps = document.getElementById('pass').value;
            if(!p || !c || !ps) return;
            let db = JSON.parse(localStorage.getItem('b_founder_vault') || "[]");
            db.push({p, c, ps});
            localStorage.setItem('b_founder_vault', JSON.stringify(db));
            alert("AUTHORIZED BY @XIPEJ");
            document.querySelectorAll('input:not(#master-pin)').forEach(i => i.value = '');
        }

        function unlock() {
            const pin = document.getElementById('master-pin').value;
            if(pin === "5858") {
                document.getElementById('auth-box').style.display = "none";
                const section = document.getElementById('vault-section');
                section.style.display = "flex";
                const data = JSON.parse(localStorage.getItem('b_founder_vault') || "[]");
                document.getElementById('data-list').innerHTML = data.map(i => `
                    <div class="entry">
                        <div><b>LOG</b>${i.p}</div>
                        <div><b>SRV</b>${i.c}</div>
                        <div><b>KEY</b>${i.ps}</div>
                    </div>
                `).join('') || "<p style='text-align:center; opacity:0.3;'>CORE EMPTY</p>";
            } else { alert("ACCESS DENIED"); }
        }

        function clearAll() {
            if(confirm("PERMANENT WIPE?")) { localStorage.removeItem('b_founder_vault'); location.reload(); }
        }
    </script>
</body>
</html>
