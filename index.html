<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUSTERENKO | NEON VAULT</title>
    <style>
        :root {
            --bg: #030305;
            --accent: #bc13fe; /* Насыщенный фиолетовый неон */
            --accent-glow: #bc13fe;
            --glass: rgba(10, 10, 15, 0.7);
            --border: rgba(188, 19, 254, 0.3);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: var(--bg);
            font-family: 'Orbitron', 'Segoe UI', sans-serif;
            color: #fff;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        /* --- ФОНОВОЕ СТАТИЧНОЕ СВЕЧЕНИЕ --- */
        .neon-aura {
            position: fixed;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(188, 19, 254, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(100px);
            z-index: 0;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }

        #snow {
            position: fixed; top: 0; left: 0; z-index: 1; pointer-events: none;
            opacity: 0.6;
        }

        /* --- СЕТКА НА ФОНЕ --- */
        .grid {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 50px 50px;
            perspective: 500px;
            z-index: 0;
            opacity: 0.2;
        }

        .container {
            position: relative; z-index: 10;
            width: 100%; max-width: 420px; padding: 20px;
        }

        /* --- КАРТОЧКА С НЕОНОВОЙ РАМКОЙ --- */
        .card {
            background: var(--glass);
            backdrop-filter: blur(40px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 
                0 0 20px rgba(0,0,0,0.5),
                inset 0 0 15px rgba(188, 19, 254, 0.1);
            margin-bottom: 25px;
            position: relative;
        }

        /* Постоянная неоновая полоска сверху */
        .card::before {
            content: "";
            position: absolute; top: -1px; left: 50%;
            transform: translateX(-50%);
            width: 40%; height: 2px;
            background: var(--accent);
            box-shadow: 0 0 15px var(--accent), 0 0 30px var(--accent);
        }

        .brand-header {
            text-align: center; margin-bottom: 30px;
        }

        .brand-header h1 {
            font-size: 24px; letter-spacing: 8px; font-weight: 900;
            margin: 0; color: #fff;
            text-shadow: 0 0 10px var(--accent), 0 0 20px var(--accent);
            animation: glitch 3s infinite;
        }

        @keyframes glitch {
            0% { text-shadow: 0 0 10px var(--accent); }
            95% { text-shadow: 0 0 10px var(--accent); transform: skew(0); }
            97% { text-shadow: 3px 0 red, -3px 0 blue; transform: skew(2deg); }
            100% { text-shadow: 0 0 10px var(--accent); }
        }

        label {
            font-size: 10px; text-transform: uppercase; color: var(--accent);
            letter-spacing: 2px; margin-left: 5px; display: block; margin-bottom: 5px;
        }

        input {
            width: 100%; padding: 14px; margin-bottom: 18px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px; color: #fff;
            box-sizing: border-box; outline: none; transition: 0.3s;
            font-family: 'Consolas', monospace;
        }

        input:focus {
            border-color: var(--accent);
            background: rgba(188, 19, 254, 0.05);
            box-shadow: 0 0 10px rgba(188, 19, 254, 0.2);
        }

        button {
            width: 100%; padding: 16px;
            background: transparent;
            border: 1px solid var(--accent);
            color: #fff; font-weight: 800; border-radius: 10px;
            cursor: pointer; transition: 0.3s;
            text-transform: uppercase; letter-spacing: 2px;
            box-shadow: inset 0 0 10px rgba(188, 19, 254, 0.2);
        }

        button:hover {
            background: var(--accent);
            box-shadow: 0 0 30px var(--accent);
            color: #000;
        }

        /* --- СПИСОК --- */
        #vault-section {
            display: none; margin-top: 20px;
            max-height: 200px; overflow-y: auto;
        }

        .entry {
            background: rgba(188, 19, 254, 0.05);
            padding: 12px; border: 1px ridge var(--border);
            border-radius: 8px; margin-bottom: 10px;
            font-size: 12px; position: relative;
        }

        .entry::after {
            content: "SECURED"; position: absolute; right: 10px; top: 10px;
            font-size: 8px; color: var(--accent); opacity: 0.5;
        }

        .btn-clear {
            border: 1px solid #ff4d4d; color: #ff4d4d; font-size: 9px;
            margin-top: 20px; padding: 8px;
        }
        .btn-clear:hover { background: #ff4d4d; color: #fff; box-shadow: 0 0 20px #ff4d4d; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); }
    </style>
</head>
<body>

    <div class="grid"></div>
    <div class="neon-aura"></div>
    <canvas id="snow"></canvas>

    <div class="container">
        <div class="brand-header">
            <h1>БУСТЕРЕНКО</h1>
        </div>

        <div class="card">
            <label>Data Input</label>
            <input type="text" id="phone" placeholder="IDENTITY">
            <input type="text" id="code" placeholder="SERVICE_ID">
            <input type="password" id="pass" placeholder="ENCRYPTION_KEY">
            <button onclick="saveData()">Upload to Core</button>
        </div>

        <div class="card">
            <label>Access Terminal</label>
            <input type="password" id="master-pin" placeholder="PIN_CODE">
            <button onclick="unlock()">Decrypt Vault</button>

            <div id="vault-section">
                <div id="data-list"></div>
                <button class="btn-clear" onclick="clearAll()">Wipe Terminal</button>
            </div>
        </div>
    </div>

    <script>
        // Тот самый снег
        const canvas = document.getElementById('snow');
        const ctx = canvas.getContext('2d');
        let width, height, flakes = [];

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            flakes = Array(100).fill().map(() => ({
                x: Math.random() * width,
                y: Math.random() * height,
                r: Math.random() * 2 + 0.5,
                d: Math.random() * 0.8 + 0.2
            }));
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = "rgba(255, 255, 255, 0.4)";
            ctx.beginPath();
            flakes.forEach(f => {
                ctx.moveTo(f.x, f.y);
                ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
                f.y += f.d;
                if (f.y > height) f.y = -10;
            });
            ctx.fill();
            requestAnimationFrame(draw);
        }
        window.onresize = init;
        init(); draw();

        // Функционал Бустеренко
        function saveData() {
            const p = document.getElementById('phone').value;
            const c = document.getElementById('code').value;
            const ps = document.getElementById('pass').value;
            if(!p || !c || !ps) return;

            let data = JSON.parse(localStorage.getItem('b_neon_vault') || "[]");
            data.push({p, c, ps});
            localStorage.setItem('b_neon_vault', JSON.stringify(data));
            alert("DATA ENCRYPTED");
            document.querySelectorAll('input:not(#master-pin)').forEach(i => i.value = '');
        }

        function unlock() {
            const pin = document.getElementById('master-pin').value;
            const section = document.getElementById('vault-section');
            if(pin === "5858") {
                section.style.display = "block";
                const data = JSON.parse(localStorage.getItem('b_neon_vault') || "[]");
                document.getElementById('data-list').innerHTML = data.map(i => `
                    <div class="entry">
                        <span style="color:#bc13fe">ID:</span> ${i.p}<br>
                        <span style="color:#bc13fe">SRV:</span> ${i.c}<br>
                        <span style="color:#bc13fe">KEY:</span> ${i.ps}
                    </div>
                `).join('') || "<p style='text-align:center; font-size:10px;'>CORE EMPTY</p>";
            } else {
                alert("ACCESS DENIED");
            }
        }

        function clearAll() {
            if(confirm("TERMINATE ALL DATA?")) {
                localStorage.removeItem('b_neon_vault');
                unlock();
            }
        }
    </script>
</body>
</html>
