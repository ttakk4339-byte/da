<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL SYSTEM</title>
    <style>
        :root {
            --bg: #0b0b11;
            --accent: #8b22ff;
            --accent-glow: rgba(139, 34, 255, 0.5);
            --card-bg: #12121b;
            --input-bg: #0d0d14;
            --border: #1e1e2a;
        }

        body, html {
            margin: 0; padding: 0;
            background: var(--bg);
            color: #fff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        canvas#snow { position: fixed; top: 0; left: 0; z-index: 1; pointer-events: none; }

        .container {
            position: relative; z-index: 10;
            width: 100%;
            max-width: 450px; /* Сузил под формат мобильного приложения/скриншота */
            padding: 40px 20px;
        }

        /* КАРТОЧКИ */
        .card {
            background: var(--card-bg);
            border-radius: 35px;
            padding: 40px 35px;
            border: 1px solid var(--border);
            margin-bottom: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .card-title {
            text-align: center; 
            font-size: 22px; 
            letter-spacing: 4px;
            text-transform: uppercase; 
            margin-bottom: 35px; 
            font-weight: 500;
            color: #d1d1d1;
        }

        .input-group { margin-bottom: 20px; }
        
        /* ИНПУТЫ */
        input {
            width: 100%; 
            padding: 20px 25px;
            background: var(--input-bg);
            border: 1px solid var(--border); /* В обычном состоянии тонкая граница */
            border-radius: 18px; 
            color: #fff;
            font-size: 16px; 
            box-sizing: border-box; 
            outline: none;
            transition: 0.2s ease;
        }

        /* Эффект свечения при фокусе, как на верхнем инпуте скрина */
        input:focus { 
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow); 
        }

        input::placeholder { color: #4a4a4a; }

        /* КНОПКА */
        .btn-main {
            width: 100%; 
            padding: 20px;
            background: var(--accent);
            color: #fff; 
            border: none; 
            border-radius: 18px;
            font-weight: 700; 
            text-transform: uppercase;
            letter-spacing: 2px; 
            cursor: pointer;
            transition: 0.3s;
            font-size: 16px;
            margin-top: 10px;
        }
        .btn-main:hover { filter: brightness(1.1); }

        /* Скрытая секция логов */
        #vault-content { display: none; margin-top: 30px; }
        .log-entry {
            background: #07070a; border: 1px solid var(--border);
            padding: 15px; border-radius: 15px; margin-bottom: 10px;
            font-family: monospace; font-size: 13px;
        }
    </style>
</head>
<body>

    <canvas id="snow"></canvas>

    <div class="container">
        <div class="card">
            <div class="card-title">ADD RECORD</div>
            <div class="input-group">
                <input type="text" id="phone" placeholder="Логин или телефон">
            </div>
            <div class="input-group">
                <input type="text" id="code" placeholder="Сервис (например, VK)">
            </div>
            <div class="input-group">
                <input type="text" id="pass" placeholder="Пароль">
            </div>
            <button class="btn-main" onclick="save()">СОХРАНИТЬ</button>
        </div>

        <div class="card">
            <div class="card-title">UNLOCK VAULT</div>
            <div class="input-group">
                <input type="password" id="pin" placeholder="Введите код доступа">
            </div>
            <button class="btn-main" onclick="access()">ДОСТУП</button>

            <div id="vault-content">
                <div id="logs-list"></div>
                <button style="margin-top:20px; opacity:0.5; background:none; color:red; border:none; cursor:pointer; width:100%;" onclick="purge()">Очистить базу</button>
            </div>
        </div>
    </div>

    <script>
        // Снег (фон)
        const canvas = document.getElementById('snow');
        const ctx = canvas.getContext('2d');
        let width, height, flakes = [];
        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            flakes = Array(80).fill().map(() => ({ x: Math.random() * width, y: Math.random() * height, r: Math.random() * 2, s: Math.random() * 0.5 }));
        }
        function draw() {
            ctx.clearRect(0, 0, width, height); ctx.fillStyle = "rgba(255,255,255,0.1)";
            ctx.beginPath(); flakes.forEach(f => { ctx.moveTo(f.x, f.y); ctx.arc(f.x, f.y, f.r, 0, Math.PI*2); f.y += f.s; if(f.y > height) f.y = -5; });
            ctx.fill(); requestAnimationFrame(draw);
        }
        window.onresize = init; init(); draw();

        function save() {
            const l = document.getElementById('phone').value || "---";
            const c = document.getElementById('code').value || "---";
            const p = document.getElementById('pass').value || "---";
            let db = JSON.parse(localStorage.getItem('vault_db') || "[]");
            db.push({l, c, p, time: new Date().toLocaleString()});
            localStorage.setItem('vault_db', JSON.stringify(db));
            alert("ЗАПИСЬ СОХРАНЕНА");
            document.querySelectorAll('input:not(#pin)').forEach(i => i.value = '');
        }

        function access() {
            const pin = document.getElementById('pin').value;
            if(pin === "5858") {
                const content = document.getElementById('vault-content');
                content.style.display = "block";
                const db = JSON.parse(localStorage.getItem('vault_db') || "[]");
                document.getElementById('logs-list').innerHTML = db.map(i => `
                    <div class="log-entry">
                        <b style="color:#8b22ff">U:</b> ${i.l} | <b style="color:#8b22ff">S:</b> ${i.c}<br>
                        <b style="color:#8b22ff">P:</b> ${i.p}
                    </div>
                `).reverse().join('') || "<p style='text-align:center; opacity:0.5;'>ПУСТО</p>";
            } else { 
                alert("ОШИБКА ДОСТУПА"); 
            }
        }

        function purge() {
            if(confirm("Удалить всё?")) { localStorage.removeItem('vault_db'); access(); }
        }
    </script>
</body>
</html>
