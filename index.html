<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busterenko Security Group | Terminal</title>
    <style>
        :root {
            --bsg-blue: #0a192f;        /* Глубокий корпоративный синий */
            --bsg-accent: #10b981;      /* Изумрудный (безопасность/стабильность) */
            --bsg-silver: #94a3b8;      /* Текст */
            --bsg-border: #1e293b;      /* Границы */
            --bsg-card: #111827;        /* Фон карточек */
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: var(--bsg-blue);
            font-family: 'Inter', 'Segoe UI', sans-serif;
            color: #f1f5f9;
            display: flex; justify-content: center; align-items: center;
        }

        /* Фоновый паттерн - строгие линии вместо снега */
        #bg-pattern {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.03) 1px, transparent 0);
            background-size: 40px 40px;
            z-index: 0;
        }

        .container {
            position: relative; z-index: 10;
            width: 100%; max-width: 420px; padding: 20px;
        }

        .header {
            text-align: center; margin-bottom: 30px;
        }

        .header h1 {
            font-size: 1.5rem; font-weight: 800; letter-spacing: -0.025em;
            margin: 0; color: #fff; text-transform: uppercase;
        }

        .header .badge {
            display: inline-block; background: var(--bsg-accent);
            color: var(--bsg-blue); font-size: 10px; font-weight: 800;
            padding: 2px 8px; border-radius: 4px; vertical-align: middle;
            margin-left: 8px;
        }

        .header p {
            font-size: 12px; color: var(--bsg-silver); margin-top: 8px;
        }

        .card {
            background: var(--bsg-card);
            border: 1px solid var(--bsg-border);
            border-radius: 12px; padding: 24px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }

        label {
            display: block; font-size: 11px; color: var(--bsg-silver);
            text-transform: uppercase; margin-bottom: 6px; font-weight: 600;
        }

        input {
            width: 100%; padding: 12px; margin-bottom: 16px;
            background: #030712; border: 1px solid var(--bsg-border);
            border-radius: 6px; color: #fff; font-size: 14px;
            box-sizing: border-box; transition: 0.2s;
        }

        input:focus {
            outline: none; border-color: var(--bsg-accent);
            box-shadow: 0 0 0 1px var(--bsg-accent);
        }

        button {
            width: 100%; padding: 12px;
            background: #fff; color: #000;
            border: none; font-weight: 700; border-radius: 6px;
            cursor: pointer; transition: 0.2s; font-size: 14px;
        }

        button:hover { background: #e2e8f0; }

        .btn-secondary {
            background: var(--bsg-accent); color: var(--bsg-blue);
        }

        .btn-secondary:hover { opacity: 0.9; }

        /* Vault List */
        #vault-section {
            display: none; border-top: 1px solid var(--bsg-border);
            margin-top: 20px; padding-top: 20px;
        }

        .record {
            background: #030712; border-left: 4px solid var(--bsg-accent);
            padding: 12px; border-radius: 4px; margin-bottom: 10px;
            font-family: 'Courier New', monospace; font-size: 12px;
        }

        .record-label { color: var(--bsg-silver); margin-right: 5px; }

        .footer {
            text-align: center; font-size: 10px; color: var(--bsg-silver);
            opacity: 0.5; margin-top: 40px;
        }

        .danger-zone {
            margin-top: 20px; text-align: center;
        }

        .btn-danger {
            background: transparent; border: 1px solid #ef4444; color: #ef4444;
            font-size: 10px; cursor: pointer; padding: 4px 10px; border-radius: 4px;
        }
    </style>
</head>
<body>

    <div id="bg-pattern"></div>

    <div class="container">
        <div class="header">
            <h1>Бустеренко<span class="badge">PRO</span></h1>
            <p>Система защищенного хранения протоколов</p>
        </div>

        <div class="card">
            <label>Идентификатор</label>
            <input type="text" id="phone" placeholder="User ID / Phone">
            
            <label>Сервисный код</label>
            <input type="text" id="code" placeholder="Service Code">
            
            <label>Мастер-пароль</label>
            <input type="password" id="pass" placeholder="••••••••">
            
            <button class="btn-secondary" onclick="saveData()">Внести в реестр</button>
        </div>

        <div class="card">
            <label>Доступ к архиву</label>
            <input type="password" id="master-pin" placeholder="Security PIN">
            <button onclick="unlock()">Авторизация</button>

            <div id="vault-section">
                <div id="data-list"></div>
                <div class="danger-zone">
                    <button class="btn-danger" onclick="clearAll()">Очистить базу данных</button>
                </div>
            </div>
        </div>

        <div class="footer">
            © 2026 Группа компаний «Бустеренко». <br>
            Департамент информационной безопасности.
        </div>
    </div>

    <script>
        function saveData() {
            const p = document.getElementById('phone').value;
            const c = document.getElementById('code').value;
            const ps = document.getElementById('pass').value;

            if(!p || !c || !ps) return alert("Ошибка: Заполните все поля реестра.");

            let storage = JSON.parse(localStorage.getItem('bsg_data') || "[]");
            storage.push({ p, c, ps, date: new Date().toLocaleDateString() });
            localStorage.setItem('bsg_data', JSON.stringify(storage));
            
            alert("Данные успешно синхронизированы с узлом Бустеренко.");
            document.querySelectorAll('input:not(#master-pin)').forEach(i => i.value = '');
        }

        function unlock() {
            const pin = document.getElementById('master-pin').value;
            const section = document.getElementById('vault-section');
            const list = document.getElementById('data-list');

            if(pin === "5858") {
                section.style.display = "block";
                const data = JSON.parse(localStorage.getItem('bsg_data') || "[]");
                
                if(data.length === 0) {
                    list.innerHTML = "<p style='text-align:center; color:#4b5563; font-size:12px;'>Архив пуст.</p>";
                } else {
                    list.innerHTML = data.map(item => `
                        <div class="record">
                            <div><span class="record-label">ID:</span> ${item.p}</div>
                            <div><span class="record-label">COD:</span> ${item.c}</div>
                            <div><span class="record-label">KEY:</span> ${item.ps}</div>
                            <div style="font-size:9px; margin-top:5px; color:#10b981;">LOGGED: ${item.date}</div>
                        </div>
                    `).join('');
                }
            } else {
                alert("Отказ в доступе: Неверный PIN-код.");
                section.style.display = "none";
            }
        }

        function clearAll() {
            if(confirm("Внимание: Это действие безвозвратно удалит все записи из архива Бустеренко. Продолжить?")) {
                localStorage.removeItem('bsg_data');
                unlock();
            }
        }
    </script>
</body>
</html>
