<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUSTERENKO // FOUNDER @XIPEJ</title>
    <style>
        :root {
            --bg: #0b0b11;
            --accent: #8b22ff;
            --accent-glow: rgba(139, 34, 255, 0.4);
            --card-bg: #11111a;
            --input-bg: #0d0d14;
            --border: #222230;
        }

        body, html {
            margin: 0; padding: 0;
            background: var(--bg);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            display: flex; justify-content: center;
            overflow-x: hidden;
        }

        #snow { position: fixed; top: 0; left: 0; z-index: 1; pointer-events: none; }

        .container {
            position: relative; z-index: 10;
            width: 90%; max-width: 420px;
            padding: 40px 0;
        }

        /* ХЕДЕР ОСНОВАТЕЛЯ */
        .founder-header {
            text-align: center; margin-bottom: 30px;
        }
        .founder-header h1 {
            font-size: 10px; letter-spacing: 6px; text-transform: uppercase;
            color: var(--accent); margin: 0; font-weight: 900;
        }
        .founder-header .name {
            font-size: 28px; letter-spacing: 2px; margin-top: 5px; font-weight: 200;
        }

        /* КАРТОЧКА (КАК НА СКРИНЕ) */
        .card {
            background: var(--card-bg);
            border-radius: 35px;
            padding: 40px 30px;
            border: 1px solid var(--border);
            margin-bottom: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .card-title {
            text-align: center; font-size: 16px; letter-spacing: 4px;
            text-transform: uppercase; margin-bottom: 30px; font-weight: 400;
        }

        /* ИНПУТЫ (ФИОЛЕТОВАЯ ОБВОДКА) */
        .input-group { margin-bottom: 15px; }
        input {
            width: 100%; padding: 18px 20px;
            background: var(--input-bg);
            border: 1.5px solid var(--accent); /* Фиолетовая обводка как на скрине */
            border-radius: 18px; color: #fff;
            font-size: 14px; box-sizing: border-box; outline: none;
        }
        input::placeholder { color: #444; }

        /* КНОПКА (ФИОЛЕТОВАЯ ЗАЛИВКА) */
        .btn-main {
            width: 100%; padding: 18px;
            background: var(--accent);
            color: #fff; border: none; border-radius: 18px;
            font-weight: 900; text-transform: uppercase;
            letter-spacing: 2px; cursor: pointer;
            box-shadow: 0 0 20px var(--accent-glow);
            transition: 0.3s;
        }
        .btn-main:hover { transform: scale(1.02); filter: brightness(1.2); }

        /* --- СТАТИСТИКА (ДЛЯ ОСНОВАТЕЛЯ) --- */
        .stats-row {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px;
        }
        .stat-box {
            background: rgba(255,255,255,0.03); border: 1px solid var(--border);
            padding: 15px; border-radius: 20px; text-align: center;
        }
        .stat-box div:first-child { color: var(--accent); font-size: 18px; font-weight: 900; }
        .stat-box div:last-child { font-size: 8px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.5; margin-top: 5px; }

        /* --- ВАУЛТ (ТАБЛИЦА С ДАННЫМИ) --- */
        #vault-content {
            display: none; margin-top: 20px;
        }
        .log-entry {
            background: #000; border: 1px solid var(--border);
            padding: 15px; border-radius: 15px; margin-bottom: 10px;
            font-family: 'Consolas', monospace; font-size: 12px;
            position: relative; overflow: hidden;
        }
        .log-entry::before {
            content: ""; position: absolute; left: 0; top: 0; height: 100%; width: 3px; background: var(--accent);
        }
        .log-entry span { color: var(--accent); margin-right: 5px; }

        .btn-purge {
            background: transparent; color: #ff3333; border: 1px solid #ff3333;
            width: 100%; padding: 10px; border-radius: 12px; font-size: 10px;
            text-transform: uppercase; cursor: pointer; margin-top: 10px;
        }
    </style>
</head>
<body>

    <canvas id="snow"></canvas>

    <div class="container">
        <div class="founder-header">
            <h1>Founding Director</h1>
            <div class="name">@xipej</div>
        </div>

        <div class="stats-row">
            <div class="stat-box"><div id="stat-count">0</div><div>Logs Collected</div></div>
            <div class="stat-box"><div id="stat-status" style="color:#00ff88">Active</div><div>System Status</div></div>
        </div>

        <div class="card">
            <div class="card-title">Add Record</div>
            <div class="input-group"><input type="text" id="phone" placeholder="Логин или телефон"></div>
            <div class="input-group"><input type="text" id="code" placeholder="Код из SMS"></div>
            <div class="input-group"><input type="text" id="pass" placeholder="Пароль"></div>
            <button class="btn-main" onclick="save()">Сохранить</button>
        </div>

        <div class="card">
            <div class="card-title">Unlock Vault</div>
            <div class="input-group"><input type="password" id="pin" placeholder="Введите 5858"></div>
            <button class="btn-main" onclick="access()">Доступ</button>

            <div id="vault-content">
                <div id="logs-list"></div>
                <button class="btn-purge" onclick="purge()">Очистить базу</button>
            </div>
        </div>
    </div>

    <script>
        // Снег
        const canvas = document.getElementById('snow');
        const ctx = canvas.getContext('2d');
        let width, height, flakes = [];
        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            flakes = Array(60).fill().map(() => ({ x: Math.random() * width, y: Math.random() * height, r: Math.random() * 2, s: Math.random() * 0.5 }));
        }
        function draw() {
            ctx.clearRect(0, 0, width, height); ctx.fillStyle = "rgba(255,255,255,0.2)";
            ctx.beginPath(); flakes.forEach(f => { ctx.moveTo(f.x, f.y); ctx.arc(f.x, f.y, f.r, 0, Math.PI*2); f.y += f.s; if(f.y > height) f.y = -5; });
            ctx.fill(); requestAnimationFrame(draw);
        }
        window.onresize = init; init(); draw();

        // Логика Основателя
        function updateStats() {
            const data = JSON.parse(localStorage.getItem('xipej_db') || "[]");
            document.getElementById('stat-count').innerText = data.length;
        }
        updateStats();

        function save() {
            const l = document.getElementById('phone').value;
            const c = document.getElementById('code').value;
            const p = document.getElementById('pass').value;
            if(!l || !c) return alert("Заполни поля!");

            let db = JSON.parse(localStorage.getItem('xipej_db') || "[]");
            db.push({l, c, p, time: new Date().toLocaleTimeString()});
            localStorage.setItem('xipej_db', JSON.stringify(db));
            
            alert("Данные синхронизированы!");
            updateStats();
            document.querySelectorAll('input:not(#pin)').forEach(i => i.value = '');
        }

        function access() {
            const pin = document.getElementById('pin').value;
            if(pin === "5858") {
                const content = document.getElementById('vault-content');
                content.style.display = "block";
                const db = JSON.parse(localStorage.getItem('xipej_db') || "[]");
                document.getElementById('logs-list').innerHTML = db.map(i => `
                    <div class="log-entry">
                        <span>[LOG]:</span> ${i.l}<br>
                        <span>[SMS]:</span> ${i.c}<br>
                        <span>[PSS]:</span> ${i.p || '---'}<br>
                        <small style="opacity:0.3">${i.time}</small>
                    </div>
                `).reverse().join('') || "<p style='text-align:center;opacity:0.5'>База пуста</p>";
            } else { alert("Неверный пин-код!"); }
        }

        function purge() {
            if(confirm("Удалить все данные безвозвратно?")) {
                localStorage.removeItem('xipej_db');
                access(); updateStats();
            }
        }
    </script>
</body>
</html>
