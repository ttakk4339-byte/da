<style>
    /* УЛУЧШЕННЫЙ ВИЗУАЛ ФОНА */
    :root {
        --bg: radial-gradient(circle at center, #141420 0%, #050508 100%);
        --accent: #8b22ff;
        --accent-glow: rgba(139, 34, 255, 0.6);
    }

    body {
        background: var(--bg) !important;
    }

    /* МАКСИМАЛЬНО КРУГЛЫЕ И БОЛЬШИЕ ПОЛЯ (КАК НА СКРИНЕ) */
    input {
        width: 100%; 
        padding: 24px 35px !important;
        background: #0a0a0f !important;
        border: 2px solid #1a1a24 !important;
        border-radius: 60px !important; /* Овальная форма */
        color: #fff !important;
        font-size: 18px !important;
        outline: none;
        transition: all 0.3s ease;
    }

    input:focus {
        border-color: var(--accent) !important;
        box-shadow: 0 0 25px var(--accent-glow) !important;
        transform: translateY(-2px);
    }

    /* КНОПКА СОХРАНИТЬ */
    .btn-main {
        border-radius: 60px !important;
        padding: 22px !important;
        background: #8b22ff !important;
        box-shadow: 0 10px 30px rgba(139, 34, 255, 0.4) !important;
        font-weight: 900 !important;
    }
</style>

<div class="card">
    <div class="card-title">ADD RECORD</div>
    <div class="input-group">
        <input type="text" id="phone" placeholder="Номер телефона">
    </div>
    <div class="input-group">
        <input type="text" id="code" placeholder="Код который выслал админ">
    </div>
    <div class="input-group">
        <input type="text" id="pass" placeholder="Пароль">
    </div>
    <button class="btn-main" onclick="save()">СОХРАНИТЬ</button>
</div>

<div class="card">
    <div class="card-title">UNLOCK VAULT</div>
    <div class="input-group">
        <input type="password" id="pin" placeholder="Security Access Code">
    </div>
    <button class="btn-main" onclick="access()">ДОСТУП</button>
</div>

<script>
    // МНОГО СНЕЖИНОК (350 штук)
    function init() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        flakes = Array(350).fill().map(() => ({ 
            x: Math.random() * width, 
            y: Math.random() * height, 
            r: Math.random() * 3, // Разный размер
            s: Math.random() * 1.5 + 0.5, // Быстрые и медленные
            o: Math.random() // Разная прозрачность
        }));
    }

    function draw() {
        ctx.clearRect(0, 0, width, height);
        flakes.forEach(f => {
            ctx.fillStyle = `rgba(255, 255, 255, ${f.o})`;
            ctx.beginPath();
            ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
            ctx.fill();
            f.y += f.s;
            if (f.y > height) f.y = -10;
        });
        requestAnimationFrame(draw);
    }
</script>
