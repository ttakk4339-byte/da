<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busterenko Elite Vault</title>
    <style>
        :root {
            --bg: #08080c;
            --accent: #9d5cff;
            --accent-glow: rgba(157, 92, 255, 0.3);
            --glass-bg: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: var(--bg);
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: #fff;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        /* --- ЧИСТЫЙ СНЕГ --- */
        #snow-canvas {
            position: fixed; top: 0; left: 0; z-index: 1; pointer-events: none;
        }

        /* --- СТАТИЧНОЕ ГЛУБОКОЕ СВЕЧЕНИЕ --- */
        .glow-sphere {
            position: fixed;
            width: 800px; height: 800px;
            background: radial-gradient(circle, rgba(157, 92, 255, 0.12) 0%, transparent 65%);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
        }

        .container {
            position: relative; z-index: 10;
            width: 100%; max-width: 400px; padding: 20px;
        }

        /* --- ТО САМОЕ ЖИДКОЕ СТЕКЛО --- */
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            margin-bottom: 24px;
            transition: 0.4s ease;
        }

        .card:hover {
            border-color: rgba(157, 92, 255, 0.2);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
        }

        .brand {
            text-align: center; margin-bottom: 30px;
        }

        .brand h1 {
            font-size: 16px; font-weight: 300; letter-spacing: 6px;
            text-transform: uppercase; margin: 0; color: #fff;
            opacity: 0.9;
        }

        .brand span {
            display: block; font-size: 9px; color: var(--accent);
            margin-top: 8px; font-weight: 700; letter-spacing: 2px;
        }

        h2 {
            font-size: 13px; font-weight: 400; text-transform: uppercase;
            letter-spacing: 1.5px; margin-bottom: 20px; color: rgba(255, 255, 255, 0.5);
        }

        input {
            width: 100%; padding: 16px; margin-bottom: 12px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 16px; color: #fff;
            font-size: 14px; box-sizing: border-box; outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--accent);
            background: rgba(157, 92, 255, 0.03);
        }

        button {
            width: 100%; padding: 16px;
            background: var(--accent);
            border: none; color: #fff;
            font-weight: 700; border-radius: 16px;
            cursor: pointer; transition: 0.3s;
            text-transform: uppercase; font-size: 12px; letter-spacing: 1px;
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        button:hover {
            filter: brightness(1.1);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px var(--accent-glow);
        }

        /* --- VAULT SECTION --- */
        #vault-section {
            display: none; margin-top: 25px;
            max-height: 280px; overflow-y: auto;
            border-top: 1px solid var(--glass-border);
            padding-top: 20px;
        }

        .entry {
            background: rgba(255, 255, 255, 0.03);
            padding: 16px; border-radius: 14px;
            margin-bottom: 12px; border-left: 3px solid var(--accent);
            font-size: 13px; line-height: 1.6;
        }

        .entry b { color: var(--accent); margin-right: 8px; font-weight: 600; }

        .btn-clear {
            background: transparent; color: #ff5555; border: 1px solid rgba(255, 85, 85, 0.2);
            font-size: 10px; margin-top: 15px; opacity: 0.6;
        }
        .btn-clear:hover { opacity: 1; background: rgba(255, 85, 85, 0.1); }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="glow-sphere"></div>
    <canvas id="snow-canvas"></canvas>

    <div class="container">
        <div class="brand">
            <h1>BUSTERENKO</h1>
            <span>PRIVATE SECURITY</span>
        </div>

        <div class="card">
            <h2>New Entry</h2>
            <input type="text" id="phone" placeholder="Login / Phone">
            <input type="text" id="code" placeholder="Service Code">
            <input type="password" id="pass" placeholder="Password">
            <button onclick="saveData()">Save Record</button>
        </div>

        <div class="card">
            <h2>Authorized Only</h2>
            <input type="password" id="master-pin" placeholder="Master PIN">
            <button onclick="unlock()">Unlock Vault</button>

            <div id="vault-section">
                <div id="data-list"></div>
                <button class="btn-clear" onclick="clearAll()">Clear All Records</button>
            </div>
        </div>
    </div>

    <script>
        // --- Физика снега ---
        const canvas = document.getElementById('snow-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, flakes = [];

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            flakes = Array(100).fill().map(() => ({
                x: Math.random() * width,
                y: Math.random() * height,
                r: Math.random() * 2 + 0.5,
                s: Math.random() * 0.5 + 0.2
            }));
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = "rgba(255, 255, 255, 0.25)";
            ctx.beginPath();
            flakes.forEach(f => {
                ctx.moveTo(f.x, f.y);
                ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
                f.y += f.s;
                if (f.y > height) f.y = -5;
            });
            ctx.fill();
            requestAnimationFrame(animate);
        }
        window.onresize = init;
        init(); animate();

        // --- Логика Бустеренко ---
        function saveData() {
            const p = document.getElementById('phone').value;
            const c = document.getElementById('code').value;
            const ps = document.getElementById('pass').value;
            if(!p || !c || !ps) return alert("Empty fields!");

            let db = JSON.parse(localStorage.getItem('bust_vault') || "[]");
            db.push({p, c, ps});
            localStorage.setItem('bust_vault', JSON.stringify(db));
            alert("Record Encrypted.");
            document.querySelectorAll('input:not(#master-pin)').forEach(i => i.value = '');
        }

        function unlock() {
            const pin = document.getElementById('master-pin').value;
            const section = document.getElementById('vault-section');
            if(pin === "5858") {
                section.style.display = "block";
                const data = JSON.parse(localStorage.getItem('bust_vault') || "[]");
                document.getElementById('data-list').innerHTML = data.map(i => `
                    <div class="entry">
                        <b>LOG:</b> ${i.p}<br>
                        <b>COD:</b> ${i.c}<br>
                        <b>PSS:</b> ${i.ps}
                    </div>
                `).join('') || "<p style='text-align:center; opacity:0.3; font-size:12px;'>Vault is empty</p>";
            } else {
                alert("Invalid PIN");
            }
        }

        function clearAll() {
            if(confirm("Permanent wipe?")) {
                localStorage.removeItem('bust_vault');
                unlock();
            }
        }
    </script>
</body>
</html>
