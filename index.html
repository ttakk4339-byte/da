<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Cloud Vault</title>
    <style>
        :root {
            --bg: #0b0e14;
            --accent: #bc13fe;
            --glass: rgba(25, 25, 35, 0.7);
            --text: #e0b1cb;
            --input-focus: #d670ff;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden; /* Чтобы снег не создавал прокрутку */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- ЭФФЕКТ СНЕГА --- */
        #snow-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* --- КОНТЕНТ --- */
        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 
                        inset 0 0 20px rgba(188, 19, 254, 0.05);
            margin-bottom: 25px;
            transition: transform 0.3s ease;
        }

        h2 {
            margin-top: 0;
            color: #fff;
            text-align: center;
            font-weight: 300;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-size: 18px;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(188, 19, 254, 0.3);
            border-radius: 12px;
            color: #fff;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--accent);
            background: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 15px rgba(188, 19, 254, 0.2);
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #bc13fe, #7a12ff);
            border: none;
            color: white;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(188, 19, 254, 0.4);
            filter: brightness(1.1);
        }

        /* --- ВЫВОД ДАННЫХ --- */
        #vault-section {
            display: none;
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .entry {
            background: rgba(255, 255, 255, 0.03);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 12px;
            border-left: 2px solid var(--accent);
            font-size: 14px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .entry b { color: var(--accent); display: inline-block; width: 70px; }

        /* Кастомный скроллбар */
        #vault-section::-webkit-scrollbar { width: 4px; }
        #vault-section::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        .btn-clear {
            background: transparent;
            border: 1px solid rgba(255, 50, 50, 0.4);
            color: rgba(255, 50, 50, 0.8);
            font-size: 11px;
            margin-top: 20px;
        }
        .btn-clear:hover { background: rgba(255, 50, 50, 0.1); border-color: #ff3232; }
    </style>
</head>
<body>

    <canvas id="snow-canvas"></canvas>

    <div class="container">
        <div class="card">
            <h2>Add Record</h2>
            <input type="text" id="phone" placeholder="Логин или телефон">
            <input type="text" id="service" placeholder="Сервис (например, VK)">
            <input type="password" id="pass" placeholder="Пароль">
            <button onclick="saveData()">Сохранить</button>
        </div>

        <div class="card">
            <h2>Unlock Vault</h2>
            <input type="password" id="master-pin" placeholder="Введите 5858">
            <button onclick="unlock()">Доступ</button>

            <div id="vault-section">
                <div id="data-list"></div>
                <button class="btn-clear" onclick="clearAll()">Удалить все данные</button>
            </div>
        </div>
    </div>

    <script>
        // --- ЛОГИКА СНЕГА ---
        const canvas = document.getElementById('snow-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, flakes = [];

        function initSnow() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            flakes = [];
            for (let i = 0; i < 150; i++) {
                flakes.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    r: Math.random() * 3 + 1,
                    d: Math.random() * 1,
                    speed: Math.random() * 1 + 0.5
                });
            }
        }

        function drawSnow() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = "rgba(255, 255, 255, 0.6)";
            ctx.beginPath();
            for (let f of flakes) {
                ctx.moveTo(f.x, f.y);
                ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2, true);
            }
            ctx.fill();
            updateSnow();
        }

        function updateSnow() {
            for (let f of flakes) {
                f.y += f.speed;
                f.x += Math.sin(f.y / 50);
                if (f.y > height) f.y = -10, f.x = Math.random() * width;
            }
        }

        function animate() {
            drawSnow();
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', initSnow);
        initSnow();
        animate();

        // --- ЛОГИКА ХРАНИЛИЩА ---
        function saveData() {
            const p = document.getElementById('phone').value;
            const s = document.getElementById('service').value;
            const ps = document.getElementById('pass').value;

            if(!p || !s || !ps) return alert("Заполни все поля, бро");

            let storage = JSON.parse(localStorage.getItem('cloud_vault') || "[]");
            storage.push({ p, s, ps });
            localStorage.setItem('cloud_vault', JSON.stringify(storage));
            
            alert("Данные в сейфе!");
            document.querySelectorAll('input').forEach(i => i.value = '');
        }

        function unlock() {
            const pin = document.getElementById('master-pin').value;
            const section = document.getElementById('vault-section');
            const list = document.getElementById('data-list');

            if(pin === "5858") {
                section.style.display = "block";
                const data = JSON.parse(localStorage.getItem('cloud_vault') || "[]");
                
                if(data.length === 0) {
                    list.innerHTML = "<p style='text-align:center; font-size: 12px; opacity: 0.5;'>Сейф пуст</p>";
                } else {
                    list.innerHTML = data.map(item => `
                        <div class="entry">
                            <b>СЕРВИС:</b> ${item.s}<br>
                            <b>ЛОГИН:</b> ${item.p}<br>
                            <b>ПАСС:</b> ${item.ps}
                        </div>
                    `).join('');
                }
            } else {
                alert("Доступ запрещен!");
                section.style.display = "none";
            }
        }

        function clearAll() {
            if(confirm("Реально всё стереть?")) {
                localStorage.removeItem('cloud_vault');
                unlock();
            }
        }
    </script>
</body>
</html>
