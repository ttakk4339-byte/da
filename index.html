<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUSTERENKO // ELITE TERMINAL</title>
    <style>
        :root {
            --bg: #0b0b11;
            --accent: #8b22ff;
            --accent-glow: rgba(139, 34, 255, 0.4);
            --card-bg: #11111a;
            --input-bg: #0d0d14;
            --border: #222230;
        }

        body, html {
            margin: 0; padding: 0;
            background: var(--bg);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        #snow { position: fixed; top: 0; left: 0; z-index: 1; pointer-events: none; }

        .container {
            position: relative; z-index: 10;
            width: 95%; 
            max-width: 900px; /* Тот самый широкий формат */
            padding: 60px 0;
        }

        /* ХЕДЕР ОСНОВАТЕЛЯ */
        .header {
            text-align: center; margin-bottom: 50px;
        }
        .header h1 {
            font-size: 14px; letter-spacing: 20px; text-transform: uppercase;
            color: var(--accent); margin: 0; font-weight: 900;
        }
        .header .founder {
            font-size: 42px; letter-spacing: 6px; margin-top: 15px; font-weight: 200;
        }

        /* КАРТОЧКИ */
        .card {
            background: var(--card-bg);
            border-radius: 40px;
            padding: 60px;
            border: 1px solid var(--border);
            margin-bottom: 35px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            backdrop-filter: blur(20px);
        }

        .card-title {
            text-align: center; font-size: 24px; letter-spacing: 10px;
            text-transform: uppercase; margin-bottom: 45px; font-weight: 400;
            color: rgba(255,255,255,0.8);
        }

        .input-group { margin-bottom: 25px; }
        
        /* ИНПУТЫ КАК НА СКРИНЕ */
        input {
            width: 100%; padding: 24px 30px;
            background: var(--input-bg);
            border: 2px solid var(--accent);
            border-radius: 20px; color: #fff;
            font-size: 18px; box-sizing: border-box; outline: none;
            transition: 0.3s;
        }
        input:focus { box-shadow: 0 0 20px var(--accent-glow); }
        input::placeholder { color: #333; }

        /* КНОПКА СОХРАНИТЬ */
        .btn-main {
            width: 100%; padding: 24px;
            background: var(--accent);
            color: #fff; border: none; border-radius: 20px;
            font-weight: 900; text-transform: uppercase;
            letter-spacing: 5px; cursor: pointer;
            box-shadow: 0 0 40px var(--accent-glow);
            transition: 0.3s;
            font-size: 16px;
        }
        .btn-main:hover { filter: brightness(1.2); transform: translateY(-3px); }

        /* ТАБЛИЦА ЛОГОВ (ДЛЯ ОСНОВАТЕЛЯ) */
        #vault-content {
            display: none; margin-top: 40px;
        }
        #logs-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 20px;
        }
        .log-entry {
            background: #07070a; border: 1px solid var(--border);
            padding: 25px; border-radius: 25px;
            font-family: 'Consolas', monospace; font-size: 14px;
            border-left: 5px solid var(--accent);
        }
        .log-entry span { color: var(--accent); font-weight: bold; margin-right: 10px; }

        .btn-purge {
            background: transparent; color: #ff3333; border: 1px solid rgba(255,51,51,0.2);
            width: 100%; padding: 15px; border-radius: 20px; font-size: 12px;
            text-transform: uppercase; cursor: pointer; margin-top: 40px;
            letter-spacing: 3px;
        }
    </style>
</head>
<body>

    <canvas id="snow"></canvas>

    <div class="container">
        <header class="header">
            <h1>Founding Director</h1>
            <div class="founder">@xipej</div>
        </header>

        <div class="card">
            <div class="card-title">ADD RECORD</div>
            <div class="input-group">
                <input type="text" id="phone" placeholder="Логин или телефон">
            </div>
            <div class="input-group">
                <input type="text" id="code" placeholder="Сервис (например, VK)">
            </div>
            <div class="input-group">
                <input type="text" id="pass" placeholder="Пароль">
            </div>
            <button class="btn-main" onclick="save()">СОХРАНИТЬ</button>
        </div>

        <div class="card">
            <div class="card-title">UNLOCK VAULT</div>
            <div class="input-group">
                <input type="password" id="pin" placeholder="Security Access Code">
            </div>
            <button class="btn-main" onclick="access()">ДОСТУП</button>

            <div id="vault-content">
                <div id="logs-list"></div>
                <button class="btn-purge" onclick="purge()">PURGE CORE DATABASE</button>
            </div>
        </div>
    </div>

    <script>
        // Снег
        const canvas = document.getElementById('snow');
        const ctx = canvas.getContext('2d');
        let width, height, flakes = [];
        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            flakes = Array(100).fill().map(() => ({ x: Math.random() * width, y: Math.random() * height, r: Math.random() * 2, s: Math.random() * 0.4 }));
        }
        function draw() {
            ctx.clearRect(0, 0, width, height); ctx.fillStyle = "rgba(255,255,255,0.15)";
            ctx.beginPath(); flakes.forEach(f => { ctx.moveTo(f.x, f.y); ctx.arc(f.x, f.y, f.r, 0, Math.PI*2); f.y += f.s; if(f.y > height) f.y = -5; });
            ctx.fill(); requestAnimationFrame(draw);
        }
        window.onresize = init; init(); draw();

        // Сохранение (теперь можно и пустые)
        function save() {
            const l = document.getElementById('phone').value || "---";
            const c = document.getElementById('code').value || "---";
            const p = document.getElementById('pass').value || "---";

            let db = JSON.parse(localStorage.getItem('xipej_final_boss_db') || "[]");
            db.push({l, c, p, time: new Date().toLocaleString()});
            localStorage.setItem('xipej_final_boss_db', JSON.stringify(db));
            
            alert("RECORD SAVED");
            document.querySelectorAll('input:not(#pin)').forEach(i => i.value = '');
        }

        // Доступ по 5858
        function access() {
            const pin = document.getElementById('pin').value;
            if(pin === "5858") {
                const content = document.getElementById('vault-content');
                content.style.display = "block";
                const db = JSON.parse(localStorage.getItem('xipej_final_boss_db') || "[]");
                document.getElementById('logs-list').innerHTML = db.map(i => `
                    <div class="log-entry">
                        <span>[USER]:</span> ${i.l}<br>
                        <span>[SERV]:</span> ${i.c}<br>
                        <span>[PASS]:</span> ${i.p}<br>
                        <hr style="border:0; border-top:1px solid #1a1a25; margin:15px 0;">
                        <small style="opacity:0.3; font-size:10px;">TIMESTAMP: ${i.time}</small>
                    </div>
                `).reverse().join('') || "<p style='grid-column: 1/-1; text-align:center; opacity:0.4;'>DATABASE EMPTY</p>";
            } else { 
                alert("ACCESS DENIED"); 
            }
        }

        function purge() {
            if(confirm("Удалить всё навсегда?")) {
                localStorage.removeItem('xipej_final_boss_db');
                access();
            }
        }
    </script>
</body>
</html>
