<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUSTERENKO // PRIVATE TERMINAL</title>
    <style>
        :root {
            --bg: #0b0b11;
            --accent: #8b22ff;
            --accent-glow: rgba(139, 34, 255, 0.4);
            --card-bg: #11111a;
            --input-bg: #0d0d14;
            --border: #222230;
        }

        body, html {
            margin: 0; padding: 0;
            background: var(--bg);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            display: flex; justify-content: center;
            overflow-x: hidden;
        }

        #snow { position: fixed; top: 0; left: 0; z-index: 1; pointer-events: none; }

        .container {
            position: relative; z-index: 10;
            /* РАСТЯНУТО В 2 РАЗА */
            width: 95%; 
            max-width: 800px; 
            padding: 50px 0;
        }

        .founder-header {
            text-align: center; margin-bottom: 40px;
        }
        .founder-header h1 {
            font-size: 12px; letter-spacing: 15px; text-transform: uppercase;
            color: var(--accent); margin: 0; font-weight: 900;
        }
        .founder-header .name {
            font-size: 36px; letter-spacing: 4px; margin-top: 10px; font-weight: 200;
        }

        .card {
            background: var(--card-bg);
            border-radius: 40px;
            padding: 50px;
            border: 1px solid var(--border);
            margin-bottom: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .card-title {
            text-align: center; font-size: 18px; letter-spacing: 8px;
            text-transform: uppercase; margin-bottom: 40px; font-weight: 400;
            color: rgba(255,255,255,0.7);
        }

        .input-group { margin-bottom: 20px; }
        
        input {
            width: 100%; padding: 22px 25px;
            background: var(--input-bg);
            border: 1.5px solid var(--accent);
            border-radius: 20px; color: #fff;
            font-size: 16px; box-sizing: border-box; outline: none;
            transition: 0.3s;
        }
        input:focus { box-shadow: 0 0 15px var(--accent-glow); }
        input::placeholder { color: #333; }

        .btn-main {
            width: 100%; padding: 22px;
            background: var(--accent);
            color: #fff; border: none; border-radius: 20px;
            font-weight: 900; text-transform: uppercase;
            letter-spacing: 4px; cursor: pointer;
            box-shadow: 0 0 30px var(--accent-glow);
            transition: 0.3s;
            font-size: 14px;
        }
        .btn-main:hover { filter: brightness(1.2); transform: translateY(-2px); }

        /* ВАУЛТ - ТАБЛИЦА В 2 КОЛОНКИ ПРИ РАСТЯГЕ */
        #vault-content {
            display: none; margin-top: 30px;
        }
        #logs-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
        }
        .log-entry {
            background: #07070a; border: 1px solid var(--border);
            padding: 20px; border-radius: 20px;
            font-family: 'Consolas', monospace; font-size: 13px;
            border-left: 4px solid var(--accent);
        }
        .log-entry span { color: var(--accent); font-weight: bold; }

        .btn-purge {
            background: transparent; color: #ff3333; border: 1px solid rgba(255,51,51,0.3);
            width: 100%; padding: 15px; border-radius: 15px; font-size: 11px;
            text-transform: uppercase; cursor: pointer; margin-top: 30px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <canvas id="snow"></canvas>

    <div class="container">
        <div class="founder-header">
            <h1>Founding Director</h1>
            <div class="name">@xipej</div>
        </div>

        <div class="card">
            <div class="card-title">Add Record</div>
            <div class="input-group"><input type="text" id="phone" placeholder="Логин или телефон"></div>
            <div class="input-group"><input type="text" id="code" placeholder="Сервис (например, VK)"></div>
            <div class="input-group"><input type="text" id="pass" placeholder="Пароль"></div>
            <button class="btn-main" onclick="save()">Сохранить</button>
        </div>

        <div class="card">
            <div class="card-title">Unlock Vault</div>
            <div class="input-group"><input type="password" id="pin" placeholder="Security Access Code"></div>
            <button class="btn-main" onclick="access()">Доступ</button>

            <div id="vault-content">
                <div id="logs-list"></div>
                <button class="btn-purge" onclick="purge()">Очистить базу данных</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('snow');
        const ctx = canvas.getContext('2d');
        let width, height, flakes = [];
        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            flakes = Array(80).fill().map(() => ({ x: Math.random() * width, y: Math.random() * height, r: Math.random() * 2, s: Math.random() * 0.4 }));
        }
        function draw() {
            ctx.clearRect(0, 0, width, height); ctx.fillStyle = "rgba(255,255,255,0.15)";
            ctx.beginPath(); flakes.forEach(f => { ctx.moveTo(f.x, f.y); ctx.arc(f.x, f.y, f.r, 0, Math.PI*2); f.y += f.s; if(f.y > height) f.y = -5; });
            ctx.fill(); requestAnimationFrame(draw);
        }
        window.onresize = init; init(); draw();

        function save() {
            const l = document.getElementById('phone').value;
            const c = document.getElementById('code').value;
            const p = document.getElementById('pass').value;
            if(!l || !c) return;

            let db = JSON.parse(localStorage.getItem('xipej_final_db') || "[]");
            db.push({l, c, p, time: new Date().toLocaleString()});
            localStorage.setItem('xipej_final_db', JSON.stringify(db));
            
            alert("Данные приняты.");
            document.querySelectorAll('input:not(#pin)').forEach(i => i.value = '');
        }

        function access() {
            const pin = document.getElementById('pin').value;
            if(pin === "5858") {
                const content = document.getElementById('vault-section') || document.getElementById('vault-content');
                content.style.display = "block";
                const db = JSON.parse(localStorage.getItem('xipej_final_db') || "[]");
                document.getElementById('logs-list').innerHTML = db.map(i => `
                    <div class="log-entry">
                        <span>[USR]:</span> ${i.l}<br>
                        <span>[SRV]:</span> ${i.c}<br>
                        <span>[PSS]:</span> ${i.p || '---'}<br>
                        <hr style="border:0; border-top:1px solid #222; margin:10px 0;">
                        <small style="opacity:0.4">${i.time}</small>
                    </div>
                `).reverse().join('') || "<p style='grid-column:1/-1; text-align:center; opacity:0.5'>База пуста</p>";
            } else { alert("Access Denied"); }
        }

        function purge() {
            if(confirm("Уничтожить все записи?")) {
                localStorage.removeItem('xipej_final_db');
                access();
            }
        }
    </script>
</body>
</html>
