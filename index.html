<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL SYSTEM</title>
    <style>
        :root {
            --bg: #0d0d14;
            --accent: #8b22ff;
            --accent-glow: rgba(139, 34, 255, 0.4);
            --card-bg: #11111a;
            --input-bg: #0a0a0f;
            --border-soft: #1a1a24;
        }

        body, html {
            margin: 0; padding: 0;
            background: var(--bg);
            color: #fff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex; justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 40px 20px;
            z-index: 10;
        }

        .card {
            background: var(--card-bg);
            border-radius: 45px; /* Очень сильное скругление как на скрине */
            padding: 50px 35px;
            border: 1px solid var(--border-soft);
            margin-bottom: 25px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
        }

        .card-title {
            text-align: center; 
            font-size: 26px; 
            letter-spacing: 6px;
            text-transform: uppercase; 
            margin-bottom: 40px; 
            font-weight: 600;
            color: #e0e0e0;
        }

        .input-group { margin-bottom: 18px; }
        
        input {
            width: 100%; 
            padding: 22px 28px;
            background: var(--input-bg);
            border: 2px solid var(--border-soft);
            border-radius: 25px; 
            color: #fff;
            font-size: 17px; 
            box-sizing: border-box; 
            outline: none;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Эффект свечения для "активного" поля как на скриншоте */
        input:focus, input.active-style { 
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow), inset 0 0 10px rgba(139, 34, 255, 0.1); 
        }

        input::placeholder { color: #3d3d45; }

        .btn-main {
            width: 100%; 
            padding: 22px;
            background: var(--accent);
            color: #fff; 
            border: none; 
            border-radius: 28px;
            font-weight: 800; 
            text-transform: uppercase;
            letter-spacing: 3px; 
            cursor: pointer;
            transition: 0.3s;
            font-size: 18px;
            margin-top: 15px;
            box-shadow: 0 10px 25px var(--accent-glow);
        }

        .btn-main:hover { transform: translateY(-2px); filter: brightness(1.1); }

        /* Логи */
        #vault-content { display: none; margin-top: 25px; }
        .log-entry {
            background: #07070a; border: 1px solid var(--border-soft);
            padding: 18px; border-radius: 20px; margin-bottom: 12px;
            font-family: 'Consolas', monospace; font-size: 13px;
            border-left: 4px solid var(--accent);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <div class="card-title">ADD RECORD</div>
            <div class="input-group">
                <input type="text" id="phone" placeholder="Логин или телефон">
            </div>
            <div class="input-group">
                <input type="text" id="code" class="active-style" placeholder="Сервис (например, VK)">
            </div>
            <div class="input-group">
                <input type="text" id="pass" placeholder="Пароль">
            </div>
            <button class="btn-main" onclick="save()">СОХРАНИТЬ</button>
        </div>

        <div class="card">
            <div class="card-title">UNLOCK VAULT</div>
            <div class="input-group">
                <input type="password" id="pin" placeholder="Security Access Code">
            </div>
            <button class="btn-main" onclick="access()">ДОСТУП</button>

            <div id="vault-content">
                <div id="logs-list"></div>
                <button style="margin-top:20px; opacity:0.3; background:none; color:#ff4444; border:none; cursor:pointer; width:100%; font-size:10px; text-transform:uppercase;" onclick="purge()">Purge Database</button>
            </div>
        </div>
    </div>

    <script>
        function save() {
            const l = document.getElementById('phone').value || "None";
            const c = document.getElementById('code').value || "None";
            const p = document.getElementById('pass').value || "None";
            let db = JSON.parse(localStorage.getItem('terminal_db') || "[]");
            db.push({l, c, p, time: new Date().toLocaleTimeString()});
            localStorage.setItem('terminal_db', JSON.stringify(db));
            alert("RECORD ENCRYPTED AND SAVED");
            document.querySelectorAll('input:not(#pin)').forEach(i => i.value = '');
        }

        function access() {
            const pin = document.getElementById('pin').value;
            // Код доступа 5858 остается в логике, но не отображается в UI
            if(pin === "5858") {
                const content = document.getElementById('vault-content');
                content.style.display = "block";
                const db = JSON.parse(localStorage.getItem('terminal_db') || "[]");
                document.getElementById('logs-list').innerHTML = db.map(i => `
                    <div class="log-entry">
                        <span style="color:#8b22ff">ID:</span> ${i.l}<br>
                        <span style="color:#8b22ff">SRV:</span> ${i.c}<br>
                        <span style="color:#8b22ff">KEY:</span> ${i.p}
                    </div>
                `).reverse().join('') || "<p style='text-align:center; opacity:0.3;'>EMPTY</p>";
            } else { 
                alert("ACCESS DENIED: INVALID CODE"); 
            }
        }

        function purge() {
            if(confirm("Confirm full database wipe?")) {
                localStorage.removeItem('terminal_db');
                access();
            }
        }
    </script>
</body>
</html>
